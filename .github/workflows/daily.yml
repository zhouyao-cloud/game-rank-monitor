name: Daily Rank Monitor

on:
  workflow_dispatch:
  push:
    branches:
      - codex-improve-rank-monitor
  schedule:
    - cron: '0 1 * * *'

permissions:
  contents: write

concurrency:
  group: daily-rank-monitor
  cancel-in-progress: false

jobs:
  rank-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Packages
        run: |
          pip install -r requirements.txt

      - name: Run Script
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          python rank_monitor.py

      - name: Commit Data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add data/rank_history.csv data/daily_report_*.txt
          find data/charts -type f -name '*.png' -print0 | xargs -0 -r git add
          git commit -m "update rank data" || echo "nothing to commit"
          git push
